name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Bookkeeping tests (no QuickFIX, runs fast) ────────────────────────────
  bookkeeping:
    name: Bookkeeping tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgtest-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -G Ninja

      - name: Build bookkeeping tests
        run: |
          cmake --build build --target test_OrderEvent \
                               test_EventLog \
                               test_PositionTracker \
                               test_OrderManager \
                               test_RiskChecker \
                               run_bench

      - name: Run bookkeeping tests
        run: ctest --test-dir build --output-on-failure -R "test_Order|test_Event|test_Position|test_Risk"

  # ── Gateway tests (requires QuickFIX, uses Docker) ────────────────────────
  gateway:
    name: Gateway tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache Docker layers so QuickFIX doesn't rebuild from scratch every run.
      # The cache key includes the Dockerfile hash — any change to the
      # Dockerfile invalidates the cache and triggers a full rebuild.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: hft-test:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing unboundedly
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run gateway tests in Docker
        run: |
          docker run --rm hft-test:latest bash -c "
            cmake -B build -DCMAKE_BUILD_TYPE=Debug -G Ninja &&
            cmake --build build --target test_MessageTranslator \
                                         test_FIXGateway \
                                         test_Killswitch &&
            ctest --test-dir build --output-on-failure \
                  -R 'test_Message|test_FIX|test_Kill'
          "

  # ── Benchmark smoke (just verifies it builds and runs) ────────────────────
  bench:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    needs: bookkeeping

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build and smoke-run benchmark
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build --target run_bench
          ./build/run_bench 2>&1 | grep -E "TSC|passed|FAILED|ns"