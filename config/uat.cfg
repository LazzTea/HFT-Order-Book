# config/uat.cfg
# ───────────────
# Broker sandbox (UAT) session. Credentials are injected at runtime via
# environment variables — never hardcode them here.
#
# Required environment variables:
#   HFT_FIX_SENDER_COMP_ID   your firm's assigned SenderCompID
#   HFT_FIX_PASSWORD          session password (injected in toAdmin callback)
#
# The FileStorePath uses a separate directory from simulator to prevent
# sequence number collisions when switching environments.

[DEFAULT]
ConnectionType=initiator
ReconnectInterval=30
FileStorePath=./fix_store/uat
FileLogPath=./fix_logs/uat
HeartBtInt=30
ValidateUserDefinedFields=N
SocketUseSSL=Y

[SESSION]
BeginString=FIX.4.2
# SenderCompID and TargetCompID are set from env vars in toAdmin() callback.
# Set placeholder values here so QuickFIX can parse the config file —
# the actual values are overridden before logon.
SenderCompID=PLACEHOLDER_SENDER
TargetCompID=PLACEHOLDER_TARGET
SocketConnectHost=fix-uat.yourbrokerdomain.com
SocketConnectPort=4197
StartTime=07:00:00
EndTime=21:00:00
# Do NOT reset sequence numbers on logon in UAT — brokers track them.
# Only set Y during initial setup or after an explicit seq num reset.
ResetOnLogon=N
ResetOnDisconnect=N
